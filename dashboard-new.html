// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

/* monogram component — shows favicon when website is provided, falls back to letter */
window.Mono = ({m, website, size=44, r, fs=18}) => {
  const domain = website && website !== '#' ? website.replace(/^https?:\/\//,'').replace(/\/.*/,'') : null;
  const radius = r || 'var(--rsm)';
  if (domain) {
    const src = `https://www.google.com/s2/favicons?domain=${domain}&sz=64`;
    return (
      <div className="mono" style={{width:size,height:size,borderRadius:radius,overflow:'hidden',padding:0,background:'#fff'}}>
        <img src={src} alt={m}
             style={{width:'100%',height:'100%',objectFit:'contain',display:'block'}}
             onError={e=>{e.currentTarget.style.display='none';e.currentTarget.parentNode.textContent=m;}}/>
      </div>
    );
  }
  return (
    <div className="mono" style={{width:size,height:size,borderRadius:radius,fontSize:fs}}>{m}</div>

};

  newsletter:{q:['Start a newsletter','Avviare una newsletter','Crear un newsletter'],
    name:'Newsletter Stack', tools:['beehiiv','jasper','grammarly','notion'],
    r:['For a newsletter I\u2019d pair beehiiv for sending & growth, Jasper for drafts, Grammarly to polish, and Notion AI to plan issues.',
       'Per una newsletter userei beehiiv per invio e crescita, Jasper per le bozze, Grammarly per rifinire e Notion AI per pianificare.',
       'Para un newsletter usaría beehiiv para envío y crecimiento, Jasper para borradores, Grammarly para pulir y Notion AI para planear.']},
  visual:{q:['Visual branding','Branding visivo','Branding visual'],
    name:'Visual Branding', tools:['canva','midjourney','gamma','descript'],
    r:['Build a visual identity with Midjourney for original imagery, Canva AI for on-brand assets, Gamma for layouts, and Descript for video.',
       'Costruisci un\u2019identità visiva con Midjourney per le immagini, Canva AI per gli asset, Gamma per i layout e Descript per i video.',
       'Crea una identidad visual con Midjourney, Canva AI para assets, Gamma para layouts y Descript para video.']},
  video:{q:['Repurpose my video','Riusare i miei video','Reutilizar mis videos'],
    name:'Content Repurposing', tools:['descript','opus','eleven'],
    r:['To repurpose video: edit fast in Descript, cut shorts with Opus Clip, and add voiceover with ElevenLabs.',
       'Per riusare i video: monta veloce in Descript, taglia gli short con Opus Clip e aggiungi voce con ElevenLabs.',
       'Para reutilizar video: edita rápido en Descript, corta shorts con Opus Clip y añade voz con ElevenLabs.']},
};

function pickRecipe(text){
  const s=(text||'').toLowerCase();
  if(/linkedin|personal brand|post/.test(s)) return 'linkedin';
  if(/news|email|mail|subscrib|iscrit|boletin|newsletter/.test(s)) return 'newsletter';
  if(/visual|brand|logo|image|design|grafic|imagen/.test(s)) return 'visual';
  if(/video|reel|short|clip|youtube|podcast/.test(s)) return 'video';
  return 'linkedin';
}

window.Assistant = function Assistant({t, lang, accent, onAddMany, onSaveCollection, compact}){
  const li = Math.max(0, window.LANGS.indexOf(lang));
  const [msgs,setMsgs]=aUseState([{from:'a', text:t('asst_g1')}]);
  const [text,setText]=aUseState('');
  const [typing,setTyping]=aUseState(false);
  const endRef=aUseRef(null);
  aUseEffect(()=>{ endRef.current && endRef.current.scrollIntoView?null:null;
    const sc=endRef.current&&endRef.current.parentElement; if(sc) sc.scrollTop=sc.scrollHeight; },[msgs,typing]);

  function respond(userText){
    const key=pickRecipe(userText);
    const rec=RECIPES[key];
    setTyping(true);
    setTimeout(()=>{
      setTyping(false);
      setMsgs(m=>[...m,{from:'a', text:rec.r[li], tools:rec.tools, recipe:key}]);
    }, 750);
  }
  function send(v){
    const val=(v??text).trim(); if(!val) return;
    setMsgs(m=>[...m,{from:'u', text:val}]); setText(''); respond(val);
  }
  const quick = Object.values(RECIPES).map(r=>r.q[li]);

  return (
    <div style={{display:'flex',flexDirection:'column',height:'100%',minHeight:0}}>
      <div style={{display:'flex',alignItems:'center',gap:9}}>
        <window.Star size={17} color="var(--accent)"/>
        <div style={{fontWeight:600,fontSize:15}}>{t('asst')}</div>
        <span className="meta" style={{marginLeft:'auto',display:'inline-flex',alignItems:'center',gap:6}}>
          <span style={{width:7,height:7,borderRadius:9,background:'#3aa76d',display:'inline-block'}}></span>online
        </span>
      </div>
      <div className="meta" style={{marginTop:4,marginBottom:14}}>{t('asst_sub')}</div>

      <div className="scrl" style={{flex:1,minHeight:0,display:'flex',flexDirection:'column',gap:12,paddingRight:4}}>
        {msgs.map((m,i)=>(
          <div key={i} className="fade-in" style={{alignSelf:m.from==='u'?'flex-end':'flex-start',maxWidth:'90%'}}>
            <div style={{
              background:m.from==='u'?'var(--accent)':'var(--fill)', color:m.from==='u'?'#fff':'var(--ink)',
              borderRadius:m.from==='u'?'16px 16px 4px 16px':'16px 16px 16px 4px',
              padding:'11px 14px',fontSize:13.5,lineHeight:1.5}}>
              {m.text}
            </div>
            {m.tools && (
              <div style={{marginTop:9,display:'flex',flexDirection:'column',gap:7}}>
                {m.tools.map(id=>{const tl=window.toolsById[id];return(
                  <div key={id} className="toolrow" style={{background:'var(--surface)',border:'1px solid var(--line)',borderRadius:12,padding:'8px 10px'}}>
                    <window.Mono m={tl.m} website={tl.website} size={30} r={9} fs={13}/>
                    <div style={{flex:1,minWidth:0}}><div style={{fontWeight:600,fontSize:13}}>{tl.n}</div><div className="meta" style={{fontSize:11}}>{tl.c}</div></div>
                  </div>
                );})}
                <div style={{display:'flex',gap:7,marginTop:2}}>
                  <button className="pill dark" style={{padding:'8px 13px',fontSize:12.5,flex:1}}
                    onClick={()=>onAddMany(m.tools)}>{t('add')} → {t('nav_stack')}</button>
                  <button className="pill" style={{padding:'8px 13px',fontSize:12.5,flex:1}}
                    onClick={()=>onSaveCollection(RECIPES[m.recipe].name, m.tools)}>{t('s_collections').split(' ')[0]} +</button>
                </div>
              </div>
            )}
          </div>
        ))}
        {typing && (
          <div style={{alignSelf:'flex-start',background:'var(--fill)',borderRadius:'16px 16px 16px 4px',padding:'13px 16px',display:'flex',gap:5}}>
            {[0,1,2].map(i=><span key={i} style={{width:6,height:6,borderRadius:9,background:'var(--ink-3)',animation:`bob 1s ${i*0.15}s infinite`}}></span>)}
          </div>
        )}
        <div ref={endRef}></div>
      </div>

      {/* quick replies */}
      <div style={{display:'flex',flexWrap:'wrap',gap:7,margin:'12px 0'}}>
        {quick.map(q=>(
          <button key={q} className="chip" style={{padding:'7px 12px',fontSize:12}} onClick={()=>send(q)}>{q}</button>
        ))}
      </div>

      {/* composer */}
      <div style={{display:'flex',alignItems:'center',gap:9,background:'var(--surface)',border:'1px solid var(--line)',borderRadius:16,padding:'7px 7px 7px 15px'}}>
        <input value={text} onChange={e=>setText(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')send();}}
          placeholder={t('asst_ph')} style={{border:'none',outline:'none',background:'transparent',flex:1,fontSize:13.5}}/>
        <button className="avatar" style={{width:34,height:34,border:'none',cursor:'pointer'}} onClick={()=>send()}>
          <window.Icon.send size={16} color="#fff"/>
        </button>
      </div>
      <style>{`@keyframes bob{0%,100%{transform:translateY(0);opacity:.4}50%{transform:translateY(-4px);opacity:1}}`}</style>
    </div>
  );
};
</script>
<script type="text/babel">/* ============================================================
   Forma — Profile Settings (photo, profile, email, password, language)
   ============================================================ */
const { useState:sUseState, useRef:sUseRef } = React;

const SetCard = ({icon:Ic, title, sub, children}) => (
  <div className="soft fade-in" style={{padding:'26px 28px',boxShadow:'var(--shadow-sm)'}}>
    <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:20}}>
      <div style={{width:38,height:38,borderRadius:11,background:'var(--fill)',display:'grid',placeItems:'center',color:'var(--ink)'}}>
        <Ic size={19}/>
      </div>
      <div>
        <h3 style={{fontSize:16,fontWeight:600}}>{title}</h3>
        {sub && <div className="meta" style={{marginTop:2}}>{sub}</div>}
      </div>
    </div>
    {children}
  </div>
);

const Field = ({label, children}) => (
  <label className="field"><span className="meta" style={{fontWeight:500,color:'var(--ink-2)'}}>{label}</span>{children}</label>
);

window.Settings = function Settings({t, lang, setLang, profile, setProfile, onToast}){
  const [form,setForm]=sUseState(profile);
  const [pw,setPw]=sUseState({cur:'',nw:'',cf:''});
  const fileRef=sUseRef(null);
  const up=(k,v)=>setForm(f=>({...f,[k]:v}));

  function onFile(e){
    const f=e.target.files&&e.target.files[0]; if(!f) return;
    const rd=new FileReader(); rd.onload=()=>{ up('photo', rd.result); }; rd.readAsDataURL(f);
  }
  function saveProfile(){ setProfile(form); onToast(t('set_saved_toast'), 'check'); }
  function changePw(){
    if(!pw.nw || pw.nw!==pw.cf){ onToast(t('set_pw_mismatch'),'lock'); return; }
    setPw({cur:'',nw:'',cf:''}); onToast(t('set_pw_toast'),'lock');
  }

  return (
    <div style={{maxWidth:720,margin:'0 auto',display:'flex',flexDirection:'column',gap:18,paddingBottom:40}}>
      <div className="fade-in">
        <div className="label" style={{marginBottom:10}}>{t('nav_settings')}</div>
        <h1 className="serif" style={{fontSize:38,fontWeight:800,letterSpacing:'-.01em'}}>{t('set_title')}</h1>
        <p className="meta" style={{marginTop:8,fontSize:14}}>{t('set_sub')}</p>
      </div>

      {/* photo + profile */}
      <SetCard icon={window.Icon.user} title={t('set_profile')}>
        <div style={{display:'flex',alignItems:'center',gap:18,marginBottom:22}}>
          <div className="avatar" style={{width:76,height:76,fontSize:30,
                backgroundImage:form.photo?`url(${form.photo})`:'none'}}>
            {!form.photo && form.name.slice(0,1)}
          </div>
          <div style={{flex:1}}>
            <div style={{fontWeight:600,fontSize:14.5,marginBottom:2}}>{t('set_photo')}</div>
            <div className="meta" style={{marginBottom:12}}>{t('set_photo_hint')}</div>
            <div style={{display:'flex',gap:9}}>
              <button className="pill" style={{padding:'9px 15px',fontSize:13}} onClick={()=>fileRef.current.click()}>
                <window.Icon.camera size={15}/> {t('set_change_photo')}
              </button>
              {form.photo && <button className="pill ghost" style={{padding:'9px 15px',fontSize:13,color:'var(--ink-3)'}} onClick={()=>up('photo',null)}>{t('set_remove')}</button>}
              <input ref={fileRef} type="file" accept="image/*" onChange={onFile} style={{display:'none'}}/>
            </div>
          </div>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
          <Field label={t('set_name')}><input className="input" value={form.name} onChange={e=>up('name',e.target.value)}/></Field>
          <Field label={t('set_handle')}><input className="input" value={form.handle} onChange={e=>up('handle',e.target.value)}/></Field>
        </div>
        <div style={{marginTop:14}}>
          <Field label={t('set_bio')}><input className="input" value={form.bio} onChange={e=>up('bio',e.target.value)}/></Field>
        </div>
      </SetCard>

      {/* account / email */}
      <SetCard icon={window.Icon.user} title={t('set_account')}>
        <Field label={t('set_email')}>
          <input className="input" type="email" value={form.email} onChange={e=>up('email',e.target.value)}/>
        </Field>
        <div style={{marginTop:18,display:'flex',justifyContent:'flex-end'}}>
          <button className="pill dark" onClick={saveProfile}><window.Icon.check size={16} color="#fff"/> {t('set_save')}</button>
        </div>
      </SetCard>

      {/* password */}
      <SetCard icon={window.Icon.lock} title={t('set_password')}>
        <div style={{display:'flex',flexDirection:'column',gap:14}}>
          <Field label={t('set_current_pw')}><input className="input" type="password" placeholder="••••••••" value={pw.cur} onChange={e=>setPw(p=>({...p,cur:e.target.value}))}/></Field>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
            <Field label={t('set_new_pw')}><input className="input" type="password" placeholder="••••••••" value={pw.nw} onChange={e=>setPw(p=>({...p,nw:e.target.value}))}/></Field>
            <Field label={t('set_confirm_pw')}><input className="input" type="password" placeholder="••••••••" value={pw.cf} onChange={e=>setPw(p=>({...p,cf:e.target.value}))}/></Field>
          </div>
        </div>
        <div style={{marginTop:18,display:'flex',justifyContent:'flex-end'}}>
          <button className="pill" onClick={changePw}><window.Icon.lock size={15}/> {t('set_change_pw')}</button>
        </div>
      </SetCard>

      {/* language */}
      <SetCard icon={window.Icon.globe} title={t('set_lang')} sub={t('set_lang_sub')}>
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          {window.LANGS.map(L=>(
            <button key={L} onClick={()=>setLang(L)} style={{
              display:'flex',alignItems:'center',gap:13,padding:'14px 16px',borderRadius:14,cursor:'pointer',textAlign:'left',
              border:'1px solid '+(lang===L?'var(--ink)':'var(--line)'),
              background:lang===L?'var(--fill)':'var(--surface)',transition:'.16s'}}>
              <span style={{fontFamily:'var(--serif)',fontWeight:700,fontSize:15,width:30}}>{L.toUpperCase()}</span>
              <span style={{flex:1,fontWeight:500,fontSize:14.5}}>{window.LANG_LABEL[L]}</span>
              <span style={{width:22,height:22,borderRadius:999,display:'grid',placeItems:'center',
                    border:'1px solid '+(lang===L?'var(--ink)':'var(--line)'),background:lang===L?'var(--ink)':'transparent'}}>
                {lang===L && <window.Icon.check size={13} color="#fff"/>}
              </span>
            </button>
          ))}
        </div>
      </SetCard>
    </div>
  );
};
</script>
<script type="text/babel">/* ============================================================
   Forma — App shell (Command layout): sidebar + main + assistant
   ============================================================ */
const { useState, useEffect, useRef, useCallback } = React;
const { useTweaks, TweaksPanel, TweakSection, TweakText, TweakRadio, TweakToggle } = window;

const ACCENTS = {
  'Monochrome':'#16140E',
  'Sage':'oklch(0.52 0.055 155)',
  'Clay':'oklch(0.55 0.085 55)',
  'Indigo':'oklch(0.52 0.085 268)',
};

const NAV = [
  {id:'home', ic:'home', key:'nav_home'},
  {id:'stack', ic:'stack', key:'nav_stack'},
  {id:'discover', ic:'discover', key:'nav_discover'},
  {id:'collections', ic:'collections', key:'nav_collections'},
  {id:'trending', ic:'trending', key:'nav_trending'},
];

function App(){
  const [tw, setTweak] = useTweaks(TWEAK_DEFAULTS);

  const [lang, setLang] = useState(()=>localStorage.getItem('forma.lang')||'it');
  useEffect(()=>{ localStorage.setItem('forma.lang',lang); document.documentElement.lang=lang; },[lang]);
  const t = window.makeT(lang);

  const [route, setRoute] = useState({v:'home', p:null});
  const nav = useCallback((v,p=null)=>{ setRoute({v,p}); setMenu(false); document.querySelector('#main')?.scrollTo(0,0); },[]);

  const [stack, setStack] = useState(()=>new Set(window.DEFAULT_STACK));
  const [saved, setSaved] = useState(()=>new Set(window.DEFAULT_SAVED));
  const [collections, setCollections] = useState(()=>window.COLLECTIONS.map(c=>({...c})));
  const [profile, setProfile] = useState({name:tw.userName||'Alfredo', handle:'alfredo', bio:'Building my personal brand with AI', email:'alfredo@forma.app', photo:null});

  useEffect(()=>{ setProfile(p=> p.name===tw.userName?p:({...p,name:tw.userName})); },[tw.userName]);

  /* accent + card style -> CSS vars */
  useEffect(()=>{ document.documentElement.style.setProperty('--accent', ACCENTS[tw.accent]||ACCENTS.Monochrome); },[tw.accent]);
  useEffect(()=>{
    const r=document.documentElement.style;
    if(tw.cardStyle==='Editorial flat'){ r.setProperty('--rcard','12px'); r.setProperty('--rsm','10px');
      r.setProperty('--shadow','0 1px 0 rgba(22,20,14,.04)'); r.setProperty('--shadow-sm','0 1px 0 rgba(22,20,14,.03)'); }
    else { r.setProperty('--rcard','22px'); r.setProperty('--rsm','14px');
      r.setProperty('--shadow','0 1px 2px rgba(22,20,14,.05), 0 12px 32px rgba(22,20,14,.06)');
      r.setProperty('--shadow-sm','0 1px 2px rgba(22,20,14,.04), 0 4px 12px rgba(22,20,14,.04)'); }
  },[tw.cardStyle]);

  /* toast */
  const [toast, setToast] = useState(null); const tmr=useRef();
  const fire = useCallback((msg,icon)=>{ setToast({msg,icon,id:Date.now()}); clearTimeout(tmr.current); tmr.current=setTimeout(()=>setToast(null),2200); },[]);

  /* actions */
  const toggleStack = useCallback((id)=>{ setStack(s=>{ const n=new Set(s); if(n.has(id)){n.delete(id); fire(`${window.toolsById[id].n} ${t('t_removed')}`,'close');} else {n.add(id); fire(`${window.toolsById[id].n} ${t('t_added')}`,'check');} return n; }); },[fire,lang]);
  const toggleSave = useCallback((id)=>{ setSaved(s=>{ const n=new Set(s); if(n.has(id))n.delete(id); else {n.add(id); fire(`${window.toolsById[id].n} ${t('t_saved')}`,'star');} return n; }); },[fire,lang]);
  const addMany = useCallback((ids)=>{ setStack(s=>{ const n=new Set(s); ids.forEach(i=>n.add(i)); return n; }); fire(`${ids.length} → ${t('nav_stack')}`,'check'); },[fire,lang]);
  const saveCollection = useCallback((name,ids)=>{ const id='c'+Date.now(); setCollections(c=>[{id,n:name,tools:ids},...c]); fire(`${name} ${t('t_saved')}`,'collections'); nav('collections',id); },[fire,lang,nav]);
  const actions = {toggleStack, toggleSave, addMany, saveCollection};

  /* tool detail modal */
  const [toolModal, setToolModal] = useState(null);
  const openTool = useCallback((id)=>setToolModal(id),[]);
  const closeTool = useCallback(()=>setToolModal(null),[]);

  /* responsive */
  const [w,setW]=useState(window.innerWidth);
  useEffect(()=>{ const f=()=>setW(window.innerWidth); window.addEventListener('resize',f); return ()=>window.removeEventListener('resize',f); },[]);
  const desktop = w>=1120, tablet = w>=760 && w<1120, mobile = w<760;
  const [asst,setAsst]=useState(false);   // assistant drawer (tablet/mobile)
  const [menu,setMenu]=useState(false);    // mobile menu (unused now / reserved)

  const viewProps = {t, lang, name:profile.name, stack, saved, actions, collections, nav,
                     showActivity:tw.showActivity, showTrending:tw.showTrending, onOpen:openTool};

  const View = () => {
    switch(route.v){
      case 'stack': return <window.StackView {...viewProps}/>;
      case 'discover': return <window.DiscoverView {...viewProps}/>;
      case 'collections': return <window.CollectionsView {...viewProps} openId={route.p}/>;
      case 'trending': return <window.TrendingView {...viewProps}/>;
      case 'settings': return <window.Settings t={t} lang={lang} setLang={setLang} profile={profile} setProfile={setProfile} onToast={fire}/>;
      default: return <window.HomeView {...viewProps}/>;
    }
  };

  const Avatar = ({size=38,fs=15}) => (
    <div className="avatar" style={{width:size,height:size,fontSize:fs, backgroundImage:profile.photo?`url(${profile.photo})`:'none'}}>
      {!profile.photo && profile.name.slice(0,1)}
    </div>
  );

  /* ---- sidebar (desktop/tablet) ---- */
  const Sidebar = () => (
    <aside style={{borderRight:'1px solid var(--line)',padding:'24px 16px',display:'flex',flexDirection:'column',gap:5,
                   width:230,flex:'none',height:'100%',background:'var(--bg)'}}>
      <a href="index.html" style={{padding:'4px 10px 22px',cursor:'pointer',textDecoration:'none'}}>
        <div className="wordmark" style={{fontSize:21}}><window.Star size={17}/> Forma</div>
      </a>
      {NAV.map(n=>{const Ic=window.Icon[n.ic];const on=route.v===n.id;return(
        <div key={n.id} className={"sideitem"+(on?' on':'')} onClick={()=>nav(n.id)}>
          <Ic size={19}/> {t(n.key)}
        </div>
      );})}
      <div style={{flex:1}}/>
      <button className="sideitem" style={{background:'transparent',width:'100%',border:'1px solid transparent',justifyContent:'flex-start'}} onClick={()=>setAsst(true)}>
        <window.Star size={17} color="var(--accent)"/> {t('asst')}
      </button>
      <div className={"sideitem"+(route.v==='settings'?' on':'')} onClick={()=>nav('settings')} style={{marginTop:6,borderTop:'1px solid var(--line)',borderRadius:0,paddingTop:14,marginBottom:4}}>
        <Avatar size={30} fs={13}/>
        <div style={{lineHeight:1.2,overflow:'hidden'}}>
          <div style={{fontSize:13.5,fontWeight:600,whiteSpace:'nowrap',textOverflow:'ellipsis',overflow:'hidden'}}>{profile.name}</div>
          <div className="meta" style={{fontSize:11}}>{t('pro_plan')}</div>
        </div>
      </div>
    </aside>
  );

  /* ---- assistant rail / drawer ---- */
  const AsstInner = () => (
    <window.Assistant t={t} lang={lang} accent={tw.accent} onAddMany={addMany} onSaveCollection={saveCollection}/>
  );
  const AsstRail = () => (
    <aside style={{borderLeft:'1px solid var(--line)',background:'var(--surface)',padding:'24px 20px',width:330,flex:'none',height:'100%'}}>
      <AsstInner/>
    </aside>
  );

  /* ---- mobile bottom nav ---- */
  const BOTTOM=[NAV[0],NAV[2],NAV[1],NAV[3],{id:'settings',ic:'settings',key:'nav_settings'}];
  const BottomBar = () => (
    <nav style={{position:'fixed',bottom:0,left:0,right:0,height:64,background:'rgba(255,255,255,.92)',backdropFilter:'blur(12px)',
                 borderTop:'1px solid var(--line)',display:'flex',zIndex:90,paddingBottom:'env(safe-area-inset-bottom)'}}>
      {BOTTOM.map(n=>{const Ic=window.Icon[n.ic];const on=route.v===n.id;return(
        <button key={n.id} onClick={()=>nav(n.id)} style={{flex:1,border:'none',background:'transparent',display:'flex',flexDirection:'column',
          alignItems:'center',justifyContent:'center',gap:3,color:on?'var(--ink)':'var(--ink-3)',cursor:'pointer',fontSize:10,fontWeight:500}}>
          <Ic size={21}/>{t(n.key)}
        </button>
      );})}
    </nav>
  );
  const MobileTop = () => (
    <header style={{position:'sticky',top:0,zIndex:80,display:'flex',alignItems:'center',gap:12,padding:'14px 18px',
                    background:'rgba(250,250,248,.9)',backdropFilter:'blur(10px)',borderBottom:'1px solid var(--line)'}}>
      <a href="index.html" style={{textDecoration:'none'}}><div className="wordmark" style={{fontSize:20}}><window.Star size={16}/> Forma</div></a>
      <div style={{flex:1}}/>
      <button className="heart" onClick={()=>nav('settings')} style={{background:'transparent'}}><Avatar size={32} fs={13}/></button>
    </header>
  );
  const AsstFab = () => (
    <button onClick={()=>setAsst(true)} style={{position:'fixed',right:18,bottom: mobile?78:24,zIndex:91,width:56,height:56,borderRadius:999,
      background:'var(--accent)',border:'none',color:'#fff',boxShadow:'var(--shadow-lg)',cursor:'pointer',display:'grid',placeItems:'center',
      transition:'transform .15s'}} onMouseDown={e=>e.currentTarget.style.transform='scale(.92)'} onMouseUp={e=>e.currentTarget.style.transform=''}>
      <window.Star size={24} color="#fff"/>
    </button>
  );

  return (
    <div style={{height:'100%',display:'flex',flexDirection:'column'}}>
      <div style={{flex:1,display:'flex',minHeight:0}}>
        {!mobile && <Sidebar/>}
        <main id="main" className="scrl" style={{flex:1,minWidth:0,height:'100%',overflowY:'auto'}}>
          {mobile && <MobileTop/>}
          <div style={{maxWidth:1040,margin:'0 auto',padding: mobile?'22px 18px 90px':'40px var(--gut) 60px'}}>
            <View/>
          </div>
        </main>
        {desktop && <AsstRail/>}
      </div>

      {mobile && <BottomBar/>}
      {/* assistant FAB on tablet+mobile (rail hidden) */}
      {!desktop && route.v!=='settings' && <AsstFab/>}

      {/* assistant drawer */}
      {!desktop && (
        <div className={"scrim"+(asst?' show':'')} onClick={()=>setAsst(false)}>
          <div onClick={e=>e.stopPropagation()} style={{background:'var(--surface)',borderRadius:24,width:'100%',maxWidth:440,
               height: mobile?'82vh':'76vh',padding:'22px 20px',display:'flex',flexDirection:'column',boxShadow:'var(--shadow-lg)',
               transform:asst?'none':'translateY(20px) scale(.97)',transition:'.24s cubic-bezier(.2,.8,.3,1)'}}>
            <button className="heart" style={{alignSelf:'flex-end',background:'transparent',marginBottom:6}} onClick={()=>setAsst(false)}><window.Icon.close size={16}/></button>
            <div style={{flex:1,minHeight:0}}><AsstInner/></div>
          </div>
        </div>
      )}

      {/* tool detail modal */}
      {toolModal && (
        <window.ToolDetailModal id={toolModal} t={t}
          inStack={stack.has(toolModal)} saved={saved.has(toolModal)}
          onStack={toggleStack} onSave={toggleSave} onClose={closeTool}/>
      )}

      {/* toast */}
      {toast && (
        <div className={"toast show"} key={toast.id}>
          {toast.icon==='star'?<window.Star size={15} color="#fff"/>:React.createElement(window.Icon[toast.icon]||window.Icon.check,{size:16,color:'#fff'})}
          {toast.msg}
        </div>
      )}

      {/* Tweaks */}
      <TweaksPanel title="Tweaks">
        <TweakSection label="Identity"/>
        <TweakText label="Your name" value={tw.userName} onChange={v=>setTweak('userName',v)}/>
        <TweakSection label="Look & feel"/>
        <TweakRadio label="Accent" value={tw.accent} options={Object.keys(ACCENTS)} onChange={v=>setTweak('accent',v)}/>
        <TweakRadio label="Card style" value={tw.cardStyle} options={['Soft rounded','Editorial flat']} onChange={v=>setTweak('cardStyle',v)}/>
        <TweakSection label="Sections"/>
        <TweakToggle label="Trending tools" value={tw.showTrending} onChange={v=>setTweak('showTrending',v)}/>
        <TweakToggle label="Activity feed" value={tw.showActivity} onChange={v=>setTweak('showActivity',v)}/>
      </TweaksPanel>
    </div>
  );
}

(window._formaAuthPromise || Promise.resolve(null)).then(session => {
  if (!session) { window.location.replace('login.html'); return; }
  window._formaUser = session.user;
  if (window._formaUser && window._formaUser.email) {
    // Take only first word before '@' and before any dot
    var parts = window._formaUser.email.split('@')[0].split('.');
    var firstName = parts[0];
    firstName = firstName.charAt(0).toUpperCase() + firstName.slice(1);
    if (typeof TWEAK_DEFAULTS !== 'undefined') TWEAK_DEFAULTS.userName = firstName;
  }
  const loader = document.getElementById('page-loader');
  if (loader) { loader.style.transition='opacity 280ms ease'; loader.style.opacity='0'; setTimeout(()=>loader.remove(),280); }
  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
});
</script>

</body>
</html>
